%dev.quarkus.datasource.db-kind=mysql
%dev.quarkus.datasource.devservices.enabled=true
%dev.quarkus.datasource.devservices.db-name=blog_nw
%dev.quarkus.datasource.devservices.username=dbuser
%dev.quarkus.datasource.devservices.password=dbuser
%dev.quarkus.hibernate-orm.schema-management.strategy=drop-and-create

# Kafka: outgoing validation requests
mp.messaging.outgoing.validation-request.connector=smallrye-kafka
mp.messaging.outgoing.validation-request.topic=text-validation-request
mp.messaging.outgoing.validation-request.value.serializer=io.quarkus.kafka.client.serialization.JsonbSerializer

# Pre-create topics to avoid NOT_LEADER_OR_FOLLOWER warnings
quarkus.kafka.devservices.topic-partitions.text-validation-request=1
quarkus.kafka.devservices.topic-partitions.text-validation-response=1
