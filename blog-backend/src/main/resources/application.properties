# Dev: MySQL via Dev Services
%dev.quarkus.datasource.db-kind=mysql
%dev.quarkus.datasource.devservices.enabled=true
%dev.quarkus.datasource.devservices.db-name=blog_nw
%dev.quarkus.datasource.devservices.username=dbuser
%dev.quarkus.datasource.devservices.password=dbuser
%dev.quarkus.hibernate-orm.nextschema-management.strategy=drop-and-create

# Prod: H2 In-Memory
%prod.quarkus.datasource.db-kind=h2
%prod.quarkus.datasource.jdbc.url=jdbc:h2:mem:blogdb
%prod.quarkus.hibernate-orm.database.generation=drop-and-create

quarkus.swagger-ui.always-include=true

# Prod: Kafka-Broker
%prod.kafka.bootstrap.servers=redpanda-1:9092

# Kafka: outgoing validation requests
mp.messaging.outgoing.validation-request.connector=smallrye-kafka
mp.messaging.outgoing.validation-request.topic=text-validation-request
mp.messaging.outgoing.validation-request.value.serializer=io.quarkus.kafka.client.serialization.JsonbSerializer

# Kafka: incoming validation responses
mp.messaging.incoming.validation-response.connector=smallrye-kafka
mp.messaging.incoming.validation-response.topic=text-validation-response
mp.messaging.incoming.validation-response.value.deserializer=ch.hftm.messaging.ValidationResponseDeserializer
mp.messaging.incoming.validation-response.auto.offset.reset=earliest

# Kafka: outgoing summary requests
mp.messaging.outgoing.summary-request.connector=smallrye-kafka
mp.messaging.outgoing.summary-request.topic=summary-request
mp.messaging.outgoing.summary-request.value.serializer=io.quarkus.kafka.client.serialization.JsonbSerializer

# Kafka: incoming summary responses
mp.messaging.incoming.summary-response.connector=smallrye-kafka
mp.messaging.incoming.summary-response.topic=summary-response
mp.messaging.incoming.summary-response.value.deserializer=ch.hftm.messaging.SummaryResponseDeserializer
mp.messaging.incoming.summary-response.auto.offset.reset=earliest

# Kafka: outgoing comment events
mp.messaging.outgoing.comment-events.connector=smallrye-kafka
mp.messaging.outgoing.comment-events.topic=comment-events
mp.messaging.outgoing.comment-events.value.serializer=io.quarkus.kafka.client.serialization.JsonbSerializer

# Kafka: outgoing attachment events
mp.messaging.outgoing.attachment-events.connector=smallrye-kafka
mp.messaging.outgoing.attachment-events.topic=attachment-events
mp.messaging.outgoing.attachment-events.value.serializer=io.quarkus.kafka.client.serialization.JsonbSerializer

# MinIO Configuration
%dev.minio.endpoint=http://localhost:9000
%prod.minio.endpoint=http://minio:9000
minio.access-key=minioadmin
minio.secret-key=minioadmin
minio.bucket-name=blog-attachments

# Storage Quota (bytes per blog, default 20 MB)
storage.quota.per-blog=20971520

# Pre-create topics
quarkus.kafka.devservices.topic-partitions.text-validation-request=1
quarkus.kafka.devservices.topic-partitions.text-validation-response=1
quarkus.kafka.devservices.topic-partitions.summary-request=1
quarkus.kafka.devservices.topic-partitions.summary-response=1
quarkus.kafka.devservices.topic-partitions.comment-events=1
quarkus.kafka.devservices.topic-partitions.attachment-events=1
